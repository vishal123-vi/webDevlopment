<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>help center</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      .helpcenter {
        min-width: 500px;
        width: 50%;
      }
    </style>
  </head>
  <body>
    <div class="d-flex justify-content-center align-items-center vh-100">
      <div class="helpcenter shadow border p-3 rounded bg-info">
        <h1 class="text-center text-danger fw-bold">
          <i class="bi bi-question-circle-fill"></i> Help Center
        </h1>
        <p class="fw-bold text-center mt-3 text-light">
          Browse FAQs or submit a support ticket below.
        </p>
        <div class="row">
          <div class="col-md-6 border-end mt-3">
            <h5 class="mb-3">Frequently Asked Questions</h5>
            <div>
              <div class="input-group mt-3">
                <span class="input-group-text border-end-0 form-control"
                  ><i class="bi bi-lock"></i>
                  <input
                    class="form-control border-start-0"
                    type="text"
                    name="How do i track my order?"
                    placeholder="How do i track my order?"
                  />
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- left side(FAQ) -->
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
