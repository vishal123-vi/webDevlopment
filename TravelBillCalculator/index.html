<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Bill Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <form
      class="container d-flex justify-content-center align-content-center vh-100 mb-3"
    >
      <div class="card p-4 shadow w-50 h-50">
        <h1 class="text-center mb-5">Travel Bill Calculator</h1>
        <label class="text-dark fw-bold mb-3">Kilometers</label>
        <input
          type="number"
          name="Kilometer"
          placeholder="Enter the Kilometer"
          id="Kilometer"
          class="form-control"
        />
        <button
          class="btn btn-primary rounded-pill shadow fw-bold mt-3"
          id="submit"
        >
          Calculate Bill
        </button>
        <h1></h1>

        <h1 id="total"></h1>
      </div>
    </form>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
