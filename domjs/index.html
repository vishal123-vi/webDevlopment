<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Submit Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="container d-flex align-items-center justify-content-center vh-100"
    >
      <div class="border border-4 rounded shadow-lg p-4">
        <input
          type="text"
          id="fullName"
          placeholder="Enter your name"
          class="form-control"
        />
        <br />
        <input type="text" id="city" placeholder="Enter your city name" class="mt-1 form-control" />
        <br />
        <input
          type="email"
          id="email"
          placeholder="put email"
          class="mt-1 form-control"
        />
        <br />
        <input type="password" id="password" placeholder="Enter password" class="form-control mt-1" />
        <div class="d-flex justify-content-between mt-2 gap-3">
          <button class="btn btn-primary" onclick="Submit()">Submit</button>
          <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
        </div>

        <div class="card mt-3 divHide" id="dataCard">
          <div class="card-body">
            <h3 class="h5 mb-3">Your Details</h3>
            <p class="mb-2"><strong>Name:</strong> <span id="myData"></span></p>
            <p class="mb-2"><strong>City:</strong> <span id="myData2"></span></p>
            <p class="mb-2"><strong>Email:</strong> <span id="myData3"></span></p>
            <p class="mb-0"><strong>Password:</strong> <span id="myData4"></span></p>
          </div>
        </div>

      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="script.js"></script>
  </body>
</html>
