<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-primary d-flex justify-content-center align-items-center vh-100"
  >
    <div class="d-flex justify-content-between gap-5 align-items-end">
      <div
        class="bg-white p-4 rounded-2 shadow"
        style="width: 350px; height: 350px"
      >
        <h3 class="text-center mb-4">
          <span class="text-decoration-underline link-underline-primary"
            >Lo</span
          >gin
        </h3>
        <form>
            
          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text"
                ><i class="bi bi-envelope"></i
              ></span>
              <input
                type="email"
                class="form-control"
                placeholder="Enter your email"
              />
            </div>
          </div>

          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                placeholder="Confirm a password"
              />
              <span class="input-group-text"><i class="bi bi-eye"></i></span>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember" />
              <label for="remember" class="form-check-label">Remember me</label>
            </div>
            <a href="#" class="text-decoration-none">Forgot password?</a>
          </div>

          <!-- Button -->
          <button type="submit" class="btn btn-primary w-100 mb-3">
            Login Now
          </button>

          <div class="text-center d-flex justify-content-evenly">
            <p class="mb-1">Don't have an account?</p>
            <a href="#" class="text-decoration-none">Signup Now</a>
          </div>
        </form>
      </div>

      <!-- Registration form -->

      <div
        class="bg-white p-4 rounded-2 shadow"
        style="width: 440px; height: 460px"
      >
        <h3 class="text-center mb-4">
          <span class="text-decoration-underline link-underline-primary"
            >Re</span
          >gistration
        </h3>
        <form>
          <!-- name -->
          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input
                type="text"
                class="form-control"
                placeholder="Enter your name"
              />
            </div>
          </div>
          <!-- Email -->
          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text"
                ><i class="bi bi-envelope"></i
              ></span>
              <input
                type="email"
                class="form-control"
                placeholder="Enter your email"
              />
            </div>
          </div>

          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                placeholder="Create a password"
              />
              <!-- <span class="input-group-text"><i class="bi bi-eye"></i></span> -->
            </div>
          </div>

          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                placeholder="Confirm a password"
              />
              <span class="input-group-text"><i class="bi bi-eye"></i></span>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember" />
              <label for="remember" class="form-check-label"
                >I accept all terms & conditions</label
              >
            </div>
          </div>

          <!-- Button -->
          <button type="submit" class="btn btn-primary w-100 mb-3">
            Register Now
          </button>

          <div class="text-center d-flex justify-content-evenly">
            <p class="mb-1">Already have an account?</p>
            <a href="#" class="text-decoration-none">Login now</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
