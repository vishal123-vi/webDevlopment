<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quize website</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="quize-section">
      <div id="quiz">
        <h2 class="question" id="question">Quiz Question</h2>
        <hr />
        <ul>
          <li>
            <input type="radio" name="answer" id="a" />
            <label for="a" id="option-1">quiz option</label>
          </li>
          <li>
            <input type="radio" name="answer" id="b" />
            <label for="b" id="option-2">quiz option</label>
          </li>
          <li>
            <input type="radio" name="answer" id="c" />
            <label for="c" id="option-3">quiz option</label>
          </li>
          <li>
            <input type="radio" name="answer" id="d" />
            <label for="d" id="option-4">quiz option</label>
          </li>
          
        </ul>
        <hr />
        <div class="btn">
          <button type="submit" id="submit">submit</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
