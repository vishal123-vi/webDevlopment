<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration From</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    /> -->  
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- header -->
    <header>
      <div class="bg-info p-3 text-center">
        <h2 class="text-light">Coaching Institute Registration Form</h2>
      </div>
    </header>
    <!--  body -->
    <main>
      <div class="container my-4 p-5 bg-light rounded-5 border shadow">
        <form id="RegistrationForm">
          <section class="bg-white p-3 rounded-5 border mb-3">
            <div class="p-2 m-3">
              <label for="fullName" class="form-label fw-bold">Full Name</label>
              <input
                type="text"
                id="fullName"
                class="form-control"
                placeholder="Enter your  Full Name"
                required
              />
              <span class="text-danger small" id="NameError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="email" class="form-label fw-bold">email</label>
              <input
                type="email"
                name="email"
                id="email"
                class="form-control"
                placeholder="vishal123@example.com"
                required
              />
              <span class="text-danger small" id="emailError"></span>
            </div>
            <div class="m-2 mt-2">
              <label for="Mobile Number" class="fw-bold form-label"
                >Mobile Number</label
              >
              <input
                type="number"
                name="phone"
                id="phone"
                class="form-control"
                placeholder="1234567890"
                required
              />
              <span class="text-danger small" id="phoneError"></span>
            </div>
            <div class="m-2 mt-2">
              <label for="dob" class="form-label fw-bold">Date oF Birth</label>
              <input
                type="date"
                name="dob"
                id="dob"
                class="form-control"
                placeholder=" DOB"
                required
              />
              <span class="text-danger small" id="dobError"></span>
            </div>
            <div class="p-2 mt-2 d-flex gap-5">
              <label for="gender" class="form-label fw-bold">gender</label>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="male"
                  value="male"
                  class="form-switch"
                  required
                />
                <span>male</span>
              </div>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="female"
                  value="female"
                  class="form-switch"
                />
                <span>female</span>
              </div>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="others"
                  value="others"
                  class="form-switch"
                />
                <span>others</span>
              </div>
              <span class="text-danger small" id="dobError"></span>
            </div>
          </section>
          <section class="bg-white p-3 rounded-5 border mb-3">
            <div class="p-3 mt-2">
              <label for="qualification" class="form-label fw-bold"
                >Last Completed Qualification</label
              >
              <select
                name="qualification"
                id="qualification"
                class="form-select"
                required
              >
                <option value="">Select Qualification</option>
                <option value="10">Matriculation</option>
                <option value="12">Intermediate</option>
                <option value="diploma">Diploma</option>
                <option value="UG">Graduation</option>
                <option value="PG">Post Graduation</option>
              </select>
              <span class="text-danger small" id="Qualification"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="marks" class="form-label fw-bold"
                >percentage/Grade</label
              >
              <input
                type="text"
                name="marks"
                id="marks"
                class="form-control"
                placeholder="90% or A-F"
                required
              />
              <span class="text-danger small" id="marksError"></span>
            </div>
          </section>
          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="course" class="form-label fw-bold"
                >Preferred Course</label
              >
              <select name="course" id="course" class="form-select" required>
                <option value="">Select Course</option>
                <option value="iitJee">IIT-JEE</option>
                <option value="neet">NEET</option>
                <option value="bankingExams">Banking Exams</option>
                <option value="ca/cs">CA/CS</option>
                <option value="upsc">UPSC</option>
              </select>
              <span class="text-danger small" id="courseError"></span>
            </div>
            <div class="p-2 mt-2 d-flex gap-5 align-items-center">
              <label for="timings" class="form-label fw-bold"
                >Batch Timing Preference</label
              >
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="morning"
                  value="morning"
                  class="form-check"
                />
                <span>Morning</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="evening"
                  value="evening"
                  class="form-check"
                />
                <span>Evening</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="afternoon"
                  value="afternoon"
                  class="form-check"
                />
                <span>AfterNoon</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="weekends"
                  value="weekends"
                  class="form-check"
                />
                <span>Weekends</span>
              </div>
              <span class="text-danger small" id="timingsError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="address" class="form-label fw-bold">Address</label>
              <textarea
                name="address"
                id="address"
                class="form-control"
                placeholder="123, Main Street"
                required
              ></textarea>
              <span class="text-danger small" id="addressError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="city" class="form-label fw-bold">City</label>
              <input
                type="text"
                name="city"
                id="city"
                class="form-control"
                placeholder="Delhi"
                required
              />
              <span class="text-danger small" id="cityError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="pin" class="form-label fw-bold">Pin Code</label>
              <input
                type="text"
                name="pin"
                id="pin"
                class="form-control"
                placeholder="110001"
                required
              />
              <span class="text-danger small" id="pinError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <h5 class="mb-3">Guardian Details</h5>
            <div class="p-2 mt-2">
              <label for="guardianName" class="form-label fw-bold"
                >Guardian's Full Name</label
              >
              <input
                type="text"
                name="guardianName"
                id="guardianName"
                class="form-control"
                placeholder="Enter guardian's full name"
                required
              />
              <span class="text-danger small" id="guardianNameError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="guardianPhone" class="form-label fw-bold"
                >Guardian's Contact Number</label
              >
              <input
                type="text"
                name="guardianPhone"
                id="guardianPhone"
                class="form-control"
                placeholder="9876543210"
                required
              />
              <span class="text-danger small" id="guardianPhoneError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <h5 class="mb-3">Additional Info</h5>
            <div class="p-2 mt-2">
              <label for="hearAbout" class="form-label fw-bold"
                >How did you hear about us?</label
              >
              <select name="hearAbout" id="hearAbout" class="form-select" required>
                <option value="">Select an option</option>
                <option value="socialMedia">Social Media</option>
                <option value="friends">Friends/Family</option>
                <option value="internet">Internet Search</option>
                <option value="advertisement">Advertisement</option>
                <option value="other">Other</option>
              </select>
              <span class="text-danger small" id="hearAboutError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="specialRequirements" class="form-label fw-bold"
                >Special Requirements (Optional)</label
              >
              <textarea
                name="specialRequirements"
                id="specialRequirements"
                class="form-control"
                placeholder="Any special requirements or notes..."
              ></textarea>
              <span
                class="text-danger small"
                id="specialRequirementsError"
              ></span>
            </div>
          </section>

          <div class="d-flex justify-content-between">
            <button type="reset" class="btn btn-secondary">Clear</button>
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
        </form>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script3.js"></script>
  </body>
</html>
