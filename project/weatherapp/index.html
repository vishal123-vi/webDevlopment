<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- bootstrap icon -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-primary">
    <div class="d-flex justify-content-center align-items-center vh-100">
      <div class="card shadow-lg p-5 border-3 rounded-5" style="width: 700px">
        <div>
          <i
            class="bi bi-cloud-sun-fill text-warning"
            style="font-size: 90px"
          ></i>
        </div>
        <!-- Heading -->
        <h1 class="fw-bold mb-4">
          Check the weather temperature in your city.
        </h1>
        <input
          type="text"
          class="form-control border-3 fs-4"
          id="cityName"
          placeholder="Enter city name"
        />
        <button id="getWeatherBtn" class="btn btn-primary w-100 mt-3 fs-4">
          Get Weather
        </button>
        <br />
        <div>
          <label class="text-center fs-3"
            >Temp : <span id="Temperature">--</span>ºC</label
          >
        </div>
        <div class="row mt-4 gx-3">
          <div class="col-6">
            <div
              class="bg-dark bg-opacity-25 rounded-4 p-5 d-flex align-items-center"
            >
              <i class="bi bi-droplet-fill fs-1 me-3 text-info"></i>
              <div>
                <h5 class="mt-0">Humidity</h5>
                <p class="fs-4 mb-0" id="Humidity">--</p>
              </div>
            </div>
          </div>
          <div class="col-6">
            <div
              class="bg-dark bg-opacity-25 rounded-4 p-5 d-flex align-items-center"
            >
              <i class="bi bi-wind fs-1 me-3 text-secondary"></i>
              <div>
                <h5 class="mt-0">Wind</h5>
                <p class="fs-4 mb-0" id="Wind">--</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
