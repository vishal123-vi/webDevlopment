<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-primary">
    <div class="d-flex justify-content-center align-items-center vh-100">
      <div class="card shadow-lg p-5 border-3 rounded-5" style="width: 400px;">
        <input type="text" class="form-control border-3 fs-3" id="cityName" placeholder="Enter city name" />
        <button id="getWeatherBtn" class=" btn btn-primary w-100 mt-3 fs-3">Get Weather</button>

        <br />

        <div>
          <label class="text-center fs-3">Temp : <span id="Temperature">--</span>ºC</label>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
