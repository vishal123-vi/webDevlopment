<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Currency Converter</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <style>
    /* body {
  background-image: url(image/image.png);
  background-size: cover;
  background-position: center;
} */
  </style>

  <body
    class="d-flex justify-content-center align-items-center vh-100"
    style="
      background: linear-gradient(
        rgba(15, 23, 42, 0.9),
        rgba(17, 24, 39, 0.9),
        rgba(30, 58, 138, 0.9)
      );
      background-size: cover;
      background-position: center;
    "
  >
    <div class="container">
      <div
        class="card shadow-lg border-0 rounded-5 p-4 mx-auto"
        style="max-width: 600px"
      >
        <h2 class="text-center mb-4 fw-bold">
          <i class="fa-solid fa-coins text-info"></i> Currency Converter
        </h2>

        <form>
          <!-- Amount -->
          <div class="amount mb-4">
            <p class="fw-semibold mb-2">Enter Amount</p>

            <input
              value="1"
              type="number"
              class="form-control form-control-lg"
            />
          </div>

          <!-- Dropdown -->
          <div
            class="dropdown d-flex justify-content-between align-items-center gap-2"
          >
            <!-- From -->
            <div class="from w-100">
              <p class="fw-semibold mb-2">From</p>

              <div
                class="select-container border rounded-3 d-flex align-items-center p-2 bg-light"
              >
                <img src="https://flagsapi.com/US/flat/64.png" width="40" />

                <select
                  name="from"
                  class="form-select border-0 shadow-none bg-light"
                ></select>
              </div>
            </div>

            <!-- Icon -->
            <div class="mt-4">
              <i class="fa-solid fa-arrow-right-arrow-left fs-4"></i>
            </div>

            <!-- To -->
            <div class="to w-100">
              <p class="fw-semibold mb-2">To</p>

              <div
                class="select-container border rounded-3 d-flex align-items-center p-2 bg-light"
              >
                <img src="https://flagsapi.com/IN/flat/64.png" width="40" />

                <select
                  name="to"
                  class="form-select border-0 shadow-none bg-light"
                ></select>
              </div>
            </div>
          </div>

          <!-- Message -->
          <div class="msg alert alert-light text-center fw-bold my-4">
            1 USD = 80 INR
          </div>

          <!-- Button -->
          <button class="btn btn-info w-100 py-3 fs-5 rounded-4 fw-bold shadow">
            <i class="fa-solid fa-bolt me-2"></i> Get Exchange Rate
          </button>
        </form>
      </div>
    </div>

    <script src="code.js"></script>
    <script src="style.js"></script>
  </body>
</html>
