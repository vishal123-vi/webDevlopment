<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header
      class="bg-primary text-light p-3 text-center shadow sticky-bottom rounded-3"
    >
      <div class="d-flex justify-content-between align-items-center">
        <h2>Password Manager</h2>

        <div class="d-flex gap-5 pe-5">
          <a href="index.html" class="text-decoration-none text-white fs-3 pe-5"
            >Add new Password</a
          >
          <a href="showpassword.html" class="text-decoration-none text-white fs-3 pe-5"
            >View Saved Password</a
          >
        </div>
      </div>
    </header>

    <main>
      <div class="w-50 mx-auto round border border-3 border-primary p-3 mt-4">
        <form class="d-grid gap-3" id="passform">
          <input
            type="text"
            name="siteName"
            id="siteName"
            placeholder="Enter the web-site Name"
            class="form-control"
          />
          <input
            type="text"
            name="userNmae"
            id="userNmae"
            placeholder="Enter the user name"
            class="form-control"
          />
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Enter the password"
            class="form-control"
          />
          <div class="d-flex gap-3 justify-content-center">
            <button type="submit"  class="btn btn-outline-primary">save</button>
            <button type="reset"  class="btn btn-outline-danger ">clear</button>
          </div>
        </form>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
