<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContactUs</title>
    <!-- bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      .contact-us {
        max-width: 500px;
        width: 100%;
      }
      body{
        background-image: url(image.png);
       background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="d-flex justify-content-center align-items-center min-vh-100">
      <div class="contact-us shadow border p-4 rounded align-content-center bg-light ">
        <h1 class="text-center text-danger">Contact Us</h1>
        <p class="text-center fw-bold">
          Have a question? We'd love to hear from you.
        </p>

        <div class="mt-3 text-capitalize">
          <input
            class="form-control border border-dark"
            type="text"
            placeholder="Enter  your full name"
            required
          />
        </div>
        <div class="mt-3 text-capitalize">
          <input
            class="form-control border border-dark"
            type="text"
            name="Enter your email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="mt-3 text-capitalize">
          <input
            class="form-control border border-dark"
            type="text"
            name="Enter your phone number"
            placeholder="Enter your phone number"
            required
          />
        </div>
        <div class="mt-3 text-capitalize">
          <input
            class="form-control border border-dark"
            type="text"
            name="What is this about?"
            placeholder="What is this about?"
            required
          />
        </div>

        <!-- <div class="mt-3 text-capitalize">
          <input
            class="form-control border border-danger"
            type="text"
            name="write your message here.."
            placeholder="Write your message here.."
            required
          />
        </div> -->
        <textarea
          class="form-control border border-dark fs-4 p-4 mt-4"
          rows="2"
          placeholder="Write your message here.."
        ></textarea>
        <button class="text-center mt-3 form-control bg-danger py-1 fs-4">
          Send Message
        </button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
