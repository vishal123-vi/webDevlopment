<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- image -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      .login-card {
        max-width: 400px;
        width: 100%;
        border-radius: 12px;
      }
    </style>
  </head>
  <body class="">
    <div
      class="d-flex justify-content-center align-items-center vh-100"
    >
      <div class="login-card p-xxl-5 shadow">
        <h2 class="text-center text-danger">Welcome Back</h2>
        <p class="text-center">Login to your Cravings account</p>
        <!-- Email -->
        <div class="mb-3">
          <label class="fw-bold">Email</label>
          <input type="email" class="form-control" placeholder="email " />
        </div>
        <!-- password -->
        <div class="mb-3">
          <label class="fw-bold">password</label>

          <input type="password" class="form-control" placeholder="password" />
        </div>
        <!-- Remember Me forget me -->
        <div
          class="d-flex justify-content-between align-items-center mb-3 w-100"
        >
          <div><input type="checkbox" />Remember me</div>
          <a class="text-danger text-decoration-none" href="#"
            >Forget Password</a
          >
        </div>
        <!-- Button -->
        <button class="btn text-bg-danger w-100">Login</button>
        <!-- footer -->
        <p class="text-center mt-3 mb-0">Don't have an account?</p>
        <div class="text-center mt-3 mb-0">
          <a class="text-danger text-decoration-none" href="#"
            >Create an account</a
          >
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
