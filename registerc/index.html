<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- emage -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      .Register-card {
        max-width: 500px;
        width: 100%;
      }
      .form-control:focus {
        border-color: red;
        box-shadow: 0 0 5px red;
      }
    </style>
  </head>
  <body>
    <div class="d-flex justify-content-center align-items-center vh-100">
      <div class="Register-card p-xxl-5 shadow border">
        <h1 class="text-center text-danger">Create Account</h1>
        <p class="text-center">Join us as a Customer, Restaurant, or Rider</p>
        <!-- Register as: -->
        <label class="fw-bold">Register as:</label>
        <div class="d-inline-flex gap-4 align-items-center  mt-3 text-capitalize">
          <input type="radio" name="role" />customer
          <input type="radio" name="role" />restaurant
          <input type="radio" name="role" />rider
        </div>
        <!-- forms -->
        <div class="mt-3 text-capitalize">
          <input
            class="form-control border border-danger"
            type="text"
            placeholder="Enter  your full name"
            required
          />
        </div>
        <div class="mt-3">
          <input
            class="form-control border border-danger"
            type="text"
            placeholder="Enter your Email"
            required=""
          />
        </div>
        <div class="mt-3">
          <input
            class="form-control border border-danger"
            type="text"
            placeholder="Enter your phone number"
            required
          />
        </div>
        <div class="mt-3">
          <input
            class="form-control border border-danger"
            type="text"
            placeholder="Enter your password"
            required
          />
        </div>
        <div class="mt-3">
          <input
            class="form-control border border-danger"
            type="text"
            placeholder="Confirm Your Password"
            required
          />
        </div>
        <div class="mt-3">
          <input class="" type="checkbox" />
          <label>i agree to the</label>
          <a href="#" class="text-danger text-decoration-underline link-danger"
            >terms and conditions.</a
          >
        </div>
        <button class="bg-danger w-100 mt-3 form-control">Register</button>
        <div class="text-center">
          <label class="mt-3">Already Registered?</label>
          <label class="text-danger">terms and conditions</label>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
