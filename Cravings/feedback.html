<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .feedback-us {
        max-width: 500px;
        width: 100%;
      }
      body {
        background-image: url(images/Feedback.png);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div
      class="d-flex justify-content-center align-items-center min-vh-100 px-3"
    >
      <div class="feedback-us shadow border p-4 rounded bg-light">
        <h1 class="text-danger text-center">Share Feedback</h1>
        <p class="text-center fs-5">
          Help us improve your Cravings experience.
        </p>
        <div>
          <h5 class="mt-2">full name</h5>
          <input
            class="form-control mt-4 text-capitalize"
            type="text"
            placeholder="Enter your full name"
          />
        </div>
        <div>
          <h5 class="mt-2">Email</h5>
          <input
            class="text-capitalize form-control mt-2"
            type="text "
            placeholder="enter your email"
          />
        </div>
        <div>
          <label class="form-label fw-bold mt-3">Feedback Category</label>
          <select class="form-select mb-3 mt-3">
            <option selected disabled>Select a category</option>
            <option>Food Quality</option>
            <option>Delivery experience</option>
            <option>App & Websit</option>
            <option>Customer Support</option>
            <option>Pricing & Value</option>
            <option>Other</option>
          </select>
        </div>
        <div class="d-flex">
          <h5>Overall Rating</h5>
          <!-- <i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i> -->
          <img
            class="d-flex d-flex justify-content-center align-items-center"
            src="images/silverstar.png"
            alt=""
            style="height: 40px"
          />
        </div>
        <div>
          <h4>Your Feedback</h4>
          <input
            class="form-control ps-5 p-5 text-start"
            
            type="text"
            placeholder="Tell us about your experience"
          />
        </div>
        <div>
            <button class="form-control bg-danger mt-2">Submit Button</button>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
