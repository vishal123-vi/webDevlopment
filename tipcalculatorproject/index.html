<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <h1
      class="w-25 text-center bg-light rounded-3 shadow border mx-auto mt-5 p-2"
    >
      TIP CALCULATOR
    </h1>

    <form class="w-25 bg-light rounded-3 shadow border mx-auto mt-5 p-4">
      <label for="billAmount" class="mb-3">Bill Amount</label>
      <input
        type="text"
        name="billAmount"
        id="billAmount"
        placeholder="Amount to be  paid"
        class="form-control border-0 border-bottom rounded-0 shadow-none mb-3"
      />
      <label for="serviceLevel" class="d-grid mb-2">How was the service?</label>
      <select id="serviceLevel" class="form-select mt-2 mb-2">
        <option value="0.25">25% - Top Notch</option>
        <option value="0.20">20% - Excellent</option>
        <option value="0.15" selected>15% - Good</option>
        <option value="0.10">10% - Bad</option>
        <option value="0.05">5% - Worst</option>
      </select>
      <label for="peoplecount" class="mb-2">Total number of persons</label>
      <input
        type="text"
        name="peoplecount"
        placeholder="Number of people sharing the bill"
        class="form-control mt-2"
        id="peoplecount"
      />

      <button
        class="mt-3 btn btn-success py-3 fs-5 fw-bold rounded-pill shadow"
        id="submit"
      >
        calculate
      </button>
      <p>Each person should pay:</p>
        <p id="perPersonTotal" class="money">$0.00</p>
        <p id="tipInfo"></p>
    </form>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
