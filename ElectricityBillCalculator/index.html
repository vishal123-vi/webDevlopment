<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electricity Bill Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow w-50 h-50">
      <h2 class="text-center mb-5">Electricity Bill Calculator</h2>
      
      <label class="form-label fw-bold mb-3">Units</label>
      <input type="number" id="units" class="form-control mb-3" placeholder="Enter Units" min="0">
      
      <button class="btn btn-primary w-100 mb-3" onclick="calculate()" id="submit">Calculate</button>
      <button class="btn btn-danger w-100" onclick="clearData()">Clear</button>
      
      <div class="card mt-4 p-3 d-none" id="results">
        <!-- <h5 class="mb-3">Bill Details</h5> -->
        <!-- <p id="slab1"></p>
        <p id="slab2"></p>
        <p id="slab3"></p>
        <p id="slab4"></p>
        <hr> -->
        <h6 id="subtotal"></h6>
        <h6 id="surcharge"></h6>
        <h4 id="total" class="text-success mt-2">total:</h4>
      </div>
    </div>
  </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
